experiment:
  name: "exp2_curriculum"
  method: "curriculum"
  description: "PPO with reward shaping + curriculum learning (3 difficulty levels)"

env:
  task: "PnPCounterToCab"
  horizon: 500
  seed: 42

# Curriculum: apple starts close to cabinet (easy) and moves further away (hard)
# Difficulty 0 (easy)  : small placement region, apple always near cabinet
# Difficulty 1 (medium): medium placement region
# Difficulty 2 (hard)  : full placement region (same as baseline)
curriculum:
  initial_difficulty: 0
  num_levels: 3
  success_threshold: 0.5   # advance when rolling success rate exceeds this
  eval_window: 100          # number of recent episodes used to compute success rate

training:
  n_envs: 1
  total_timesteps: 1_000_000
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  lr: 3.0e-4
  ent_coef: 0.005
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2

policy:
  net_arch: [256, 256]

logging:
  save_dir: "checkpoints"
  log_dir: "/tmp/gym"
  use_wandb: true
  wandb_project: "robocasa-pnp"
